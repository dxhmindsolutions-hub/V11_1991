  if (!tiempoValor) return "";

  const ahora = new Date();
  let minutos = 0;

  if (tiempoValor.includes("h")) {

    const match = tiempoValor.match(/(\d+)h\s*(\d+)?/);

    if (match) {
      minutos += parseInt(match[1]) * 60;

      if (match[2]) {
        minutos += parseInt(match[2]);
      }
    }

  } else {

    minutos = parseInt(tiempoValor) || 0;
  }

  });
};

    const fechaKey = `${dia}${mes}`;
    let data = JSON.parse(localStorage.getItem("ticketData")) || {};
    if (!data[fechaKey]) data[fechaKey] = 0;
    data[fechaKey]++;
    localStorage.setItem("ticketData", JSON.stringify(data));

    const numero = String(data[fechaKey]).padStart(5, "0");
    return `${fechaKey}-${hora}${min}-${numero}`;
  };

  let contadores = JSON.parse(localStorage.getItem("contadoresPedidos")) || {
    llevar: 40,
    recoger: 70
  };

  if (tipo === "llevar") {

    const numero = contadores.llevar;

    if (!preview) {
      contadores.llevar++;

      localStorage.setItem(
        "contadoresPedidos",
        JSON.stringify(contadores)
      );
    }

    return `LLEVAR ${numero}`;
  }

  if (tipo === "recoger") {

    const numero = contadores.recoger;

    if (!preview) {
      contadores.recoger++;

      localStorage.setItem(
        "contadoresPedidos",
        JSON.stringify(contadores)
      );
    }

    return `RECOGER ${numero}`;
  }

  return "";
};

                      Sin artículos
                    </div>
                  )}
                  {ticketActivo.filter(t => !t.esHijoMenu).map((t, i) => (
                    <div key={i} style={{
                      display:"flex", justifyContent:"space-between", alignItems:"center",
                      padding:"14px 16px", borderBottom:"1px solid #1e2130"
                    }}>
                      <div style={{ display:"flex", gap:"10px", alignItems:"flex-start" }}>
                        <span style={{ color:"#888", minWidth:"20px" }}>{t.cantidad}</span>
                        <div>
                          <div style={{ fontSize:"14px" }}>{t.nombre}</div>
                          {t.nota && <div style={{ color:"#888", fontSize:"12px" }}>{t.nota}</div>}
                          {(t.gluten||t.verdura||t.carne||t.huevo||t.marisco||t.frutossecos) && (
                            <div style={{ color:"#f59e0b", fontSize:"11px" }}>
                              {[t.gluten&&"SIN GLUTEN",t.verdura&&"NO VERDURA",t.carne&&"NO CARNE",t.huevo&&"NO HUEVO",t.marisco&&"ALERGIA MARISCO",t.frutossecos&&"ALERGIA F.SECOS"].filter(Boolean).join(" / ")}
                            </div>
                          )}
                        </div>
                      </div>
                      <span style={{ fontWeight:"bold", fontSize:"14px" }}>{(t.precio*t.cantidad).toFixed(2)} €</span>
                    </div>
                  ))}
                </div>

                {/* TOTAL */}
                <div style={{
                  display:"flex", justifyContent:"space-between", alignItems:"center",
                  padding:"16px 0", borderTop:"1px solid #1e2130", marginTop:"8px"
                }}>
                  <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
                    <span style={{ fontWeight:"bold", fontSize:"16px" }}>Total</span>
                    <span style={{
                      background:"#1e2130", color:"#aaa", fontSize:"12px",
                      padding:"3px 10px", borderRadius:"20px"
                    }}>{articulosCount} artículo{articulosCount !== 1 ? "s" : ""}</span>
                  </div>
                  <span style={{ fontWeight:"bold", fontSize:"22px" }}>{totalActivo.toFixed(2)} €</span>
                </div>
              </div>

              {/* BOTONES INFERIORES */}
              <div style={{ padding:"12px 20px 16px", display:"flex", flexDirection:"column", gap:"8px" }}>
                <button onClick={irAEditarPedido} style={{
                  width:"100%", background:"linear-gradient(135deg,#7c3aed,#6d28d9)",
                  border:"none", color:"#fff", padding:"14px", borderRadius:"12px",
                  fontWeight:"bold", fontSize:"16px", cursor:"pointer",
                  display:"flex", alignItems:"center", justifyContent:"center", gap:"8px"
                }}>💳 Cobrar</button>
                <div style={{ display:"flex", gap:"8px" }}>
                  <button onClick={irACocinaActivo} style={{
                    flex:1, background:"linear-gradient(135deg,#ea580c,#c2410c)",
                    border:"none", color:"#fff", padding:"12px", borderRadius:"12px",
                    fontWeight:"bold", fontSize:"14px", cursor:"pointer"
                  }}>🍳 Comandar</button>
                  <button onClick={irATicketActivo} style={{
                    flex:1, background:"linear-gradient(135deg,#ca8a04,#a16207)",
                    border:"none", color:"#fff", padding:"12px", borderRadius:"12px",
                    fontWeight:"bold", fontSize:"14px", cursor:"pointer"
                  }}>🧾 Ticket</button>
                </div>
              </div>
            </>
          )}
        </div>

        {/* ── COL 3: INFO PEDIDO + CLIENTE ── */}
        <div style={{
          width:"280px", flexShrink:0, background:"#141720",
          overflowY:"auto", padding:"16px"
        }}>
          {!pedidoSeleccionado ? (
            <div style={{ color:"#444", fontSize:"13px", textAlign:"center", paddingTop:"40px" }}>
              Selecciona un pedido para ver los detalles
            </div>
          ) : (
            <>
              {/* INFO PEDIDO */}
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"14px" }}>
                <span style={{ fontWeight:"bold", fontSize:"15px" }}>Información del pedido</span>
                <button onClick={irAEditarPedido} style={{ background:"none", border:"none", color:"#a78bfa", fontSize:"18px", cursor:"pointer" }}>✏️</button>
              </div>

              {pedidoActivo?.tiempo && (
                <div style={{ marginBottom:"12px" }}>
                  <div style={{ color:"#666", fontSize:"11px", marginBottom:"2px" }}>Programado</div>
                  <div style={{ color:"#ddd", fontSize:"13px" }}>{programadoFecha}</div>
                </div>
              )}

              {horaEntregaActivo && (
                <div style={{ marginBottom:"12px" }}>
                  <div style={{ color:"#666", fontSize:"11px", marginBottom:"2px" }}>Hora de recogida</div>
                  <div style={{ color:"#ddd", fontSize:"13px" }}>{horaEntregaActivo}</div>
                </div>
              )}

              {pedidoActivo?.tiempo && (
                <div style={{ marginBottom:"12px" }}>
                  <div style={{ color:"#666", fontSize:"11px", marginBottom:"2px" }}>Tiempo estimado</div>
                  <div style={{ color:"#ddd", fontSize:"13px" }}>{pedidoActivo.tiempo}</div>
                </div>
              )}

              {(pedidoActivo?.direccion || pedidoActivo?.zona) && (
                <div style={{ marginBottom:"16px" }}>
                  <div style={{ color:"#666", fontSize:"11px", marginBottom:"2px" }}>Dirección</div>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
                    <div style={{ color:"#ddd", fontSize:"13px", flex:1 }}>
                      {pedidoActivo.direccion}{pedidoActivo.zona ? ` – ${pedidoActivo.zona}` : ""}
                    </div>
                    <span style={{ color:"#a78bfa", fontSize:"16px", marginLeft:"8px" }}>📍</span>
                  </div>
                </div>
              )}

              <div style={{ borderTop:"1px solid #1e2130", paddingTop:"16px", marginBottom:"14px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"14px" }}>
                  <span style={{ fontWeight:"bold", fontSize:"15px" }}>Información del cliente</span>
                  <span style={{ color:"#a78bfa", fontSize:"18px" }}>👤</span>
                </div>

                {pedidoActivo?.telefono && (
                  <>
                    <div style={{ marginBottom:"10px" }}>
                      <div style={{ color:"#666", fontSize:"11px", marginBottom:"2px" }}>Nombre del cliente</div>
                      <div style={{ color:"#ddd", fontSize:"13px" }}>{pedidoActivo.telefono}</div>
                    </div>
                    <div style={{ marginBottom:"12px" }}>
                      <div style={{ color:"#666", fontSize:"11px", marginBottom:"2px" }}>Teléfono del cliente</div>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                        <span style={{ color:"#ddd", fontSize:"13px" }}>{pedidoActivo.telefono}</span>
                        <span style={{ color:"#a78bfa", fontSize:"16px" }}>📞</span>
                      </div>
                    </div>
                  </>
                )}

                {pedidoActivo?.metodoPago && (
                  <div style={{ marginBottom:"16px" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:"8px" }}>
                        <span style={{ color:"#a78bfa", fontSize:"16px" }}>💳</span>
                        <span style={{ color:"#ddd", fontSize:"13px" }}>Método de pago</span>
                      </div>
                      <span style={{
                        background: pedidoActivo.metodoPago === "EFECTIVO" ? "#16a34a" : "#1d4ed8",
                        color:"#fff", fontSize:"11px", padding:"3px 9px",
                        borderRadius:"5px", fontWeight:"bold"
                      }}>{pedidoActivo.metodoPago}</span>
                    </div>
                  </div>
                )}
              </div>

              {/* ASIGNAR REPARTIDOR — solo para llevar */}
              {pedidoSeleccionado?.tipo === "llevar" && (
                <div style={{ marginBottom:"16px", borderTop:"1px solid #1e2130", paddingTop:"16px" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"10px" }}>
                    <span style={{ fontWeight:"bold", fontSize:"15px" }}>🛵 Repartidor</span>
                    {pedidoActivo?.repartidor && (
                      <span style={{ background:"#1d4ed8", color:"#fff", fontSize:"11px", padding:"3px 9px", borderRadius:"5px", fontWeight:"bold" }}>
                        {pedidoActivo.repartidor}
                      </span>
                    )}
                  </div>
                  <div style={{ display:"flex", flexDirection:"column", gap:"6px" }}>
                    {repartidores.map(rep => (
                      <button key={rep} onClick={() => {
                        const { tipo, id } = pedidoSeleccionado;
                        setPedidos(prev => ({
                          ...prev,
                          [tipo]: {
                            ...prev[tipo],
                            [id]: { ...prev[tipo][id], repartidor: pedidoActivo?.repartidor === rep ? "" : rep }
                          }
                        }));
                      }} style={{
                        background: pedidoActivo?.repartidor === rep ? "#1d4ed8" : "#1a1d2a",
                        border: pedidoActivo?.repartidor === rep ? "1.5px solid #3b82f6" : "1.5px solid #2a2f45",
                        color: pedidoActivo?.repartidor === rep ? "#fff" : "#aaa",
                        padding:"9px 12px", borderRadius:"8px", cursor:"pointer",
                        fontWeight:"bold", fontSize:"13px", textAlign:"left",
                        display:"flex", alignItems:"center", gap:"8px"
                      }}>
                        <span>{pedidoActivo?.repartidor === rep ? "✅" : "🛵"}</span>
                        <span>{rep}</span>
                      </button>
                    ))}
                  </div>
                </div>
              )}

              {/* CANCELAR */}
              <button onClick={cerrarPedidoActivo} style={{
                width:"100%", background:"transparent",
                border:"1.5px solid #dc2626", color:"#ef4444",
                padding:"12px", borderRadius:"10px", fontWeight:"bold",
                fontSize:"14px", cursor:"pointer",
                display:"flex", alignItems:"center", justifyContent:"center", gap:"8px"
              }}>🗑 Cancelar pedido</button>
            </>
          )}
        </div>

      </div>
    </div>
  );
}

if (modoMesas) {
  const ahora = new Date();
  const horaAhora = ahora.toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });

  const abrirMesa = (n) => { setTipoPedido("comer"); setPedidoNumero(String(n)); setModoMesas(false); };
  const ocp = (n) => !!pedidos.salon[n];

  // ── Mesa PRINCIPAL ──
  const M = (n, circle=false, w=72, h=54) => {
    const ok = ocp(n);
    return (
      <div onClick={() => abrirMesa(n)} style={{
        width:w, height:h, display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"center", cursor:"pointer",
        background: ok ? "linear-gradient(145deg,#f97316,#ea580c)" : "#1c2035",
        border: ok ? "1.5px solid #fb923c" : "1.5px solid #2a3050",
        borderRadius: circle ? "50%" : "10px",
        boxShadow: ok ? "0 0 14px rgba(249,115,22,0.45)" : "inset 0 1px 0 rgba(255,255,255,0.04)",
        transition:"all 0.15s", userSelect:"none", flexShrink:0
      }}>
        <span style={{ fontSize: circle?"17px":"14px", fontWeight:"700", color: ok?"#fff":"#c8d0e8", letterSpacing:"0.5px" }}>{n}</span>
        <span style={{ fontSize:"9px", color: ok?"#fed7aa":"#3d4a6b", marginTop:"2px", letterSpacing:"0.5px" }}>{ok?"Ocupada":"Libre"}</span>
      </div>
    );
  };

  // ── Mesa AUXILIAR pequeña ──
  const A = (n, w=44, h=40) => {
    const ok = ocp(n);
    return (
      <div onClick={() => abrirMesa(n)} style={{
        width:w, height:h, display:"flex", flexDirection:"column",
        alignItems:"center", justifyContent:"center",
        cursor:"pointer", background: ok ? "linear-gradient(145deg,#f97316,#ea580c)" : "#1c2035",
        border: ok ? "1.5px solid #fb923c" : "1.5px solid #2a3050",
        borderRadius:"8px", userSelect:"none", flexShrink:0,
        boxShadow: ok ? "0 0 10px rgba(249,115,22,0.4)" : "inset 0 1px 0 rgba(255,255,255,0.04)"
      }}>
        <span style={{ fontSize:"12px", fontWeight:"600", color: ok?"#fff":"#c8d0e8" }}>{n}</span>
        <span style={{ fontSize:"8px", color: ok?"#fed7aa":"#3d4a6b", marginTop:"1px" }}>{ok?"Ocp":"—"}</span>
      </div>
    );
  };

  // ── Separador (muro / pasillo) ──
  const Sep = ({ w=80, vertical=false }) => (
    <div style={{
      width: vertical ? 3 : w, height: vertical ? 80 : 3,
      background:"#2a3050", borderRadius:2,
      flexShrink:0, alignSelf:"center"
    }} />
  );

  // ── Etiqueta de zona ──
  const ZL = ({ txt }) => (
    <div style={{ fontSize:"10px", color:"#94a3b8", letterSpacing:"2px", fontWeight:"700", textTransform:"uppercase", marginBottom:"6px" }}>{txt}</div>
  );

  const tabActivo = seccionActiva === "interior" ? "interior" : "principal";

  // ── NAV compartido ──
  const NavBar = () => (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 20px", height:"56px", background:"#0f1117", borderBottom:"1px solid #1e2130", flexShrink:0 }}>
      <div style={{ display:"flex", alignItems:"center", gap:"10px" }}>
        <button onClick={()=>setModoMesas(false)} style={{ background:"none", border:"none", color:"#aaa", fontSize:"20px", cursor:"pointer" }}>☰</button>
        <span style={{ fontWeight:"bold", fontSize:"16px", color:"#fff" }}>Mini POS</span>
      </div>
      <div style={{ display:"flex", gap:"4px" }}>
        {[
          { label:"🧾 Pedidos", active:false, onClick:()=>{ setModoMesas(false); setModoPedidos(true); setPedidoSeleccionado(null); } },
          { label:"⊞ Mesas", active:true, onClick:()=>{} },
          { label:"🍳 Cocina", active:false, onClick:()=>{} },
          { label:"⚙️ Ajustes", active:false, onClick:()=>{ setModoMesas(false); setModoAjustes(true); } }
        ].map(btn => (
          <button key={btn.label} onClick={btn.onClick} style={{
            background:"transparent", border:"none",
            color: btn.active ? "#a78bfa" : "#888",
            fontWeight: btn.active ? "bold" : "normal",
            padding:"8px 14px", borderRadius:"8px", cursor:"pointer", fontSize:"14px",
            borderBottom: btn.active ? "2px solid #a78bfa" : "2px solid transparent"
          }}>{btn.label}</button>
        ))}
      </div>
      <div style={{ display:"flex", alignItems:"center", gap:"12px" }}>
        <span style={{ color:"#aaa", fontSize:"14px" }}>{horaAhora}</span>
        <button onClick={()=>setModoMesas(false)} style={{ background:"none", border:"none", color:"#aaa", fontSize:"20px", cursor:"pointer" }}>🏠</button>
      </div>
    </div>
  );

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", background:"#0f1117", color:"#fff", fontFamily:"system-ui,sans-serif", overflow:"hidden" }}>

      <NavBar />

      {/* ── TABS ── */}
      <div style={{ display:"flex", padding:"0 24px", background:"#0f1117", borderBottom:"1px solid #1e2130", flexShrink:0 }}>
        {[["principal","Sala Principal"],["interior","Sala Interior"]].map(([key,label]) => (
          <button key={key} onClick={()=>setSeccionActiva(key)} style={{
            background:"transparent", border:"none", cursor:"pointer",
            padding:"13px 20px 11px", fontWeight:"600", fontSize:"13px",
            color: tabActivo===key ? "#fff" : "#555",
            borderBottom: tabActivo===key ? "2px solid #a78bfa" : "2px solid transparent",
          }}>{label}</button>
        ))}
      </div>

      {/* ── CONTENIDO ── */}
      <div style={{ flex:1, overflowY:"auto", padding:"16px", display:"flex", justifyContent:"center", alignItems:"flex-start" }}>

        {/* ════ SALA PRINCIPAL ════ */}
        {tabActivo === "principal" && (

            {/* ENTRADA — línea completa arriba centrada */}

              <div style={{ flex:1, height:"1px", background:"#2a3050" }} />

            <div style={{ display:"flex", gap:"20px", alignItems:"flex-start" }}>

              {/* ── COL A: 2, 3, [sep pared], 4, 5, [pilar], 7 ── */}
              <div style={{ display:"flex", flexDirection:"column", gap:"10px" }}>
                {M(2, false, 76, 56)}
                {M(3, false, 76, 56)}
                {/* separador horizontal — pared */}
                <div style={{ width:"76px", height:"3px", background:"#2a3050", borderRadius:2 }} />
                {M(4, false, 76, 56)}
                {M(5, false, 76, 56)}
                {/* pilar */}
                <div style={{ width:"28px", height:"26px", background:"#131726", border:"1px solid #1e2440", borderRadius:"4px" }} />
                {M(7, false, 76, 56)}

              {/* ── COL B: offset — 9, 10 sin sep entre ellas, [sep pared entre 10 y 11], 11, 12, [sep], 13, 14 ── */}
              <div style={{ display:"flex", flexDirection:"column", gap:"10px", alignItems:"flex-start", marginTop:"66px" }}>
                {M(9, false, 66, 52)}
                {A(10, 66, 34)}

                <div style={{ width:"66px", height:"3px", background:"#2a3050", borderRadius:2 }} />
                {M(11, false, 66, 52)}
                {A(12, 66, 34)}
                {/* sep */}
                <div style={{ width:"66px", height:"3px", background:"#2a3050", borderRadius:2 }} />
                {M(13, false, 66, 52)}
                {A(14, 66, 34)}
              </div>

              {/* ── COL C: 8 círculo arriba, luego 15-18 pegadas a pared (sin gap extra), fila [20+19], sep abajo ── */}
              <div style={{ display:"flex", flexDirection:"column", gap:"0px", alignItems:"flex-start" }}>
                {/* 8 alineado a la derecha */}
                <div style={{ display:"flex", justifyContent:"flex-end", width:"100%", marginBottom:"10px" }}>
                  {M(8, true, 72, 72)}
                </div>
                {/* 15-18 pegadas a la pared derecha, gap mínimo */}
                {M(15, false, 68, 50)}
                <div style={{ height:"8px" }} />
                {M(16, false, 68, 50)}
                <div style={{ height:"8px" }} />
                {M(17, false, 68, 50)}
                <div style={{ height:"8px" }} />
                {M(18, false, 68, 50)}
                <div style={{ height:"10px" }} />
                <div style={{ display:"flex", gap:"10px", alignItems:"center" }}>
                  {A(20, 44, 50)}
                  {M(19, false, 68, 50)}
                </div>
                {/* sep horizontal abajo — pared */}
                <div style={{ width:"122px", height:"3px", background:"#2a3050", borderRadius:2, alignSelf:"flex-end", marginTop:"8px" }} />
              </div>

            </div>

            {/* BARRA — forma L, esquina inferior izquierda */}
            <div style={{ marginTop:"24px", position:"relative", width:"220px", height:"70px" }}>
              {/* parte horizontal */}
              <div style={{
                position:"absolute", left:0, top:0,
                width:"160px", height:"44px",
                background:"#161b30", border:"1px solid #252d4a",
                borderRadius:"10px 10px 0 0",
                display:"flex", alignItems:"center", paddingLeft:"16px"
              }}>
                <span style={{ color:"#94a3b8", fontSize:"10px", letterSpacing:"3px", fontWeight:"700" }}>BARRA</span>
              </div>
              {/* parte vertical (bajada L) */}
              <div style={{
                position:"absolute", left:0, top:"44px",
                width:"100px", height:"26px",
                background:"#161b30", border:"1px solid #252d4a",
                borderTop:"none", borderRadius:"0 0 0 8px"
              }} />
              {/* esquina interior curva */}
              <div style={{
                position:"absolute", left:"100px", top:"44px",
                width:"60px", height:"26px",
                background:"#0f1117"
              }} />
            </div>

          </div>
        )}

        {/* ════ SALA INTERIOR ════ */}
        {tabActivo === "interior" && (
          <div style={{ background:"#0d1020", border:"1px solid #1a2040", borderRadius:"16px", padding:"16px 20px", display:"inline-flex", flexDirection:"column" }}>

            {/* cabeceras zona */}
            <div style={{ display:"flex", gap:"48px", marginBottom:"12px", paddingLeft:"8px" }}>
              <div style={{ width:"80px", textAlign:"center" }}>
                <ZL txt="Zona A" />
              </div>
              <div style={{ width:"140px", textAlign:"center" }}>
                <ZL txt="Zona B" />
              </div>
            </div>

            {/* 2 columnas */}
            <div style={{ display:"flex", gap:"48px", alignItems:"flex-start" }}>

              {/* ── ZONA A: 21, [espacio], 22(aux), 23(aux), [espacio], fila[24 + 124] ── */}
              <div style={{ display:"flex", flexDirection:"column", gap:"10px" }}>
                {M(21, false, 80, 60)}
                <div style={{ height:"6px" }} />
                {A(22, 80, 44)}
                {A(23, 80, 44)}
                <div style={{ height:"6px" }} />
                <div style={{ display:"flex", gap:"8px", alignItems:"center" }}>
                  {M(24, false, 68, 54)}
                  {A(124, 44, 54)}
                </div>
              </div>

              {/* ── ZONA B: [125+25], [espacio], [126+26], [espacio grande], 27 ── */}
              <div style={{ display:"flex", flexDirection:"column", gap:"10px" }}>
                <div style={{ display:"flex", gap:"8px", alignItems:"center" }}>
                  {A(125, 44, 52)}
                  {M(25, false, 80, 52)}
                </div>
                <div style={{ height:"6px" }} />
                <div style={{ display:"flex", gap:"8px", alignItems:"center" }}>
                  {A(126, 44, 52)}
                  {M(26, false, 80, 52)}
                </div>
                <div style={{ height:"20px" }} />
                {/* 27 alineado a la derecha */}
                <div style={{ display:"flex", justifyContent:"flex-end" }}>
                  {M(27, false, 80, 64)}
                </div>
              </div>

            </div>
          </div>
        )}

      </div>
    </div>
  );
}

   {/* ── HEADER ── */}
<div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 16px", height:"56px", background:"#0f1117", borderBottom:"1px solid #1e2130", position:"sticky", top:0, zIndex:40 }}>

  <button onClick={() => setMenuAbierto(true)} style={{ background:"none", border:"none", color:"#aaa", fontSize:"20px", cursor:"pointer" }}>☰</button>

  <button onClick={() => { setModoMesas(false); setModoCocina(false); setModoTicket(false); setModoGestion(false); setMenuAbierto(false); }} style={{ background:"none", border:"none", color:"#aaa", fontSize:"18px", cursor:"pointer" }}>🏠</button>

  <span style={{ fontWeight:"bold", fontSize:"16px" }}>Mini POS</span>

  <button onClick={() => { setModoPedidos(true); setPedidoSeleccionado(null); }} style={{ background:"none", border:"none", color:"#aaa", fontSize:"18px", cursor:"pointer" }}>🛵</button>

  <button onClick={() => setModoAjustes(true)} style={{ background:"none", border:"none", color:"#aaa", fontSize:"18px", cursor:"pointer" }}>⚙️</button>

</div>

    {/* ── MENU LATERAL ── */}
    <div style={{
      position:"fixed", top:0, left:0, width:"240px", height:"100%",
      background:"#141720", zIndex:50, transform: menuAbierto ? "translateX(0)" : "translateX(-100%)",
      transition:"transform 0.25s ease", overflowY:"auto", borderRight:"1px solid #1e2130"
    }}>
      <div style={{ padding:"16px", fontWeight:"bold", borderBottom:"1px solid #1e2130", color:"#fff" }}>Categorías</div>
      {categorias.map(c => (
        <button key={c} onClick={() => { setCategoriaActiva(c); setMenuAbierto(false); }} style={{
          display:"block", width:"100%", textAlign:"left", padding:"12px 16px", background: categoriaActiva === c ? "#7c3aed" : "transparent",
          border:"none", color: categoriaActiva === c ? "#fff" : "#aaa", cursor:"pointer", fontSize:"14px",
          borderBottom:"1px solid #1e2130"
        }}>{c}</button>
      ))}
    </div>
    {menuAbierto && <div onClick={()=>setMenuAbierto(false)} style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.5)", zIndex:49 }} />}

  <div style={{ padding:"16px", maxWidth:"480px", margin:"0 auto" }}>

    {/* TIPO PEDIDO */}
    <div style={{ display:"flex", gap:"8px", marginBottom:"12px" }}>
      {[["comer","🍽️ Comer"],["llevar","🥡 Llevar"],["recoger","🚶 Recoger"]].map(([t,l])=>(
        <button key={t} onClick={()=>setTipoPedido(t)} style={{
          flex:1, padding:"9px 0", borderRadius:"8px", fontWeight:"bold", fontSize:"13px", cursor:"pointer",
          background: tipoPedido===t ? "#7c3aed" : "#1a1d2a",
          border: tipoPedido===t ? "none" : "1px solid #2a2f45",
          color: tipoPedido===t ? "#fff" : "#888"
        }}>{l}</button>
      ))}
    </div>

    {/* MESA / COMENSALES */}
    <div style={{ display:"flex", gap:"8px", marginBottom:"12px" }}>
      <input placeholder="Mesa" value={pedidoNumero} onChange={e=>setPedidoNumero(e.target.value)} style={{...darkInput, flex:1}} />
      <input placeholder="Comensales" value={comensales} onChange={e=>setComensales(e.target.value)} style={{...darkInput, flex:1}} />
    </div>

    {/* BÚSQUEDA */}
    <input value={busqueda} onChange={e=>setBusqueda(e.target.value)} onKeyDown={(e)=>{ if(e.key==="Enter"){agregarArticulo(busqueda); setBusqueda("");}}} placeholder="Referencia..." style={{...darkInput, marginBottom:"12px"}} />

    {/* LISTA CATEGORÍA */}
    {categoriaActiva && (
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"8px" }}>
        <span style={{ fontWeight:"bold", color:"#c4cae0" }}>{categoriaActiva}</span>
        <button onClick={() => setListaAbierta(!listaAbierta)} style={{ background:"#1a1d2a", border:"1px solid #2a2f45", color:"#aaa", padding:"4px 10px", borderRadius:"6px", cursor:"pointer", fontSize:"12px" }}>
          {listaAbierta ? "▲ Ocultar" : "▼ Mostrar"}
        </button>
      </div>
    )}
    {lista.length > 0 && listaAbierta && (
      <div style={{ background:"#1a1d2a", border:"1px solid #2a2f45", borderRadius:"10px", overflow:"hidden", marginBottom:"12px" }}>
        {lista.map(([ref, a]) => (
          <div key={ref} onClick={() => agregarArticulo(ref)} style={{
            display:"grid", gridTemplateColumns:"56px 1fr auto",
            alignItems:"center", padding:"10px 14px", borderBottom:"1px solid #252840", cursor:"pointer"
          }}>
            <span style={{ fontWeight:"bold", color:"#a78bfa", fontSize:"13px" }}>{ref}</span>
            <span style={{ color:"#ccc", fontSize:"13px", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{a.nombre}</span>
            <span style={{ color:"#888", fontSize:"13px", fontFamily:"monospace" }}>{a.precio}€</span>
          </div>
        ))}
      </div>
    )}

    {/* TICKET */}
    {ticket.map((t, i) => {
      if (t.esHijoMenu) return null;
      const menu = MENUS?.[t.ref];
      return (
        <div key={i} style={{ borderBottom:"1px solid #1e2130", padding:"10px 0" }}>
          <div style={{ display:"flex", alignItems:"flex-start", justifyContent:"space-between" }}>
            <div style={{ flex:1 }}>
              <div style={{ fontWeight:"bold", fontSize:"17px", color:"#fff" }}>{t.cantidad} × {t.ref}</div>
              <div style={{ fontSize:"11px", color:"#555" }}>{t.nombre}</div>
              {menu && (
                <div style={{ fontSize:"11px", fontWeight:"bold", color:"#7c6fd0", paddingLeft:"8px", marginTop:"2px" }}>
                  {menu.items.map(([r]) => {
                    const mod = t.mods?.[r] ?? "";
                    return <div key={r} onClick={() => editarSubMenu(t.ref, r)} style={{ cursor:"pointer" }}>{r}{mod ? ` ${mod}` : ""}</div>;
                  })}
                </div>
              )}
              {(t.nota||t.aceite||t.gluten||t.verdura||t.carne||t.huevo||t.marisco||t.frutossecos) && (
                <div style={{ fontSize:"10px", fontWeight:"bold", color:"#f59e0b", marginTop:"2px" }}>
                  {[t.verdura&&"NO VERDURA",t.carne&&"NO CARNE",t.gluten&&"SIN GLUTEN",t.aceite&&"ACEITE",t.huevo&&"NO HUEVO",t.marisco&&"ALERGIA MARISCO",t.frutossecos&&"ALERGIA F.SECOS",t.nota].filter(Boolean).join(" / ")}
                </div>
              )}
            </div>
            <div style={{ display:"flex", alignItems:"center", gap:"6px", marginLeft:"8px" }}>
              <div style={{ display:"flex", gap:"4px" }}>
                {[["➖",()=>restar(t.ref)],["➕",()=>sumar(t.ref)],["❌",()=>eliminarLinea(t.ref)],["📝",()=>editarNota(t)]].map(([ico,fn])=>(
                  <button key={ico} onClick={(e)=>{e.stopPropagation();fn();}} style={{ background:"#1a1d2a", border:"1px solid #2a2f45", color:"#aaa", width:"28px", height:"28px", borderRadius:"6px", cursor:"pointer", fontSize:"13px" }}>{ico}</button>
                ))}
              </div>
              <span style={{ fontWeight:"bold", fontFamily:"monospace", color:"#fff", minWidth:"58px", textAlign:"right" }}>{(t.precio*t.cantidad).toFixed(2)}€</span>
            </div>
          </div>
        </div>
      );
    })}

    {/* TOTAL */}
    <div style={{ display:"flex", justifyContent:"space-between", borderTop:"1px solid #2a2f45", padding:"12px 0", fontWeight:"bold", fontSize:"18px", color:"#fff" }}>
      <span>Total</span>
      <span>{total.toFixed(2)}€</span>
    </div>

    {/* CAMPOS LLEVAR / RECOGER */}
    {(tipoPedido === "llevar" || tipoPedido === "recoger") && (
      <div style={{ display:"flex", flexDirection:"column", gap:"8px", marginBottom:"12px" }}>
        <div style={{ display:"flex", gap:"8px" }}>
          <input placeholder="📍 Dirección" value={direccion} onChange={e=>setDireccion(e.target.value)} style={{...darkInput, flex:2}} />
          <select value={zona} onChange={e=>setZona(e.target.value)} style={{...darkSelect, flex:1}}>
            <option value="">Zona</option>
            <option>VNG</option><option>TACÓ</option><option>TENIS</option><option>COLLADA</option>
            <option>FONDO SOMELLA</option><option>PRAT DE VILANOVA</option><option>URB. SANTA MARIA</option>
            <option>ROQUETES</option><option>CUBELLES</option><option>CAMPING VILANOVA PARK</option>
            <option>BAR HIGUERA</option><option>CINES ODEON</option>
          </select>
        </div>
        <input placeholder="📞 Teléfono" value={telefono} onChange={e=>setTelefono(e.target.value)} style={darkInput} />
        <select value={tiempo} onChange={e=>setTiempo(e.target.value)} style={darkSelect}>
          <option value="">⏱ Tiempo estimado</option>
          <option>10 min</option><option>15 min</option><option>20 min</option><option>30 min</option>
          <option>40 min</option><option>50 min</option><option>1h</option><option>1h 10min</option>
          <option>1h 15min</option><option>1h 20min</option><option>1h 30min</option>
        </select>
        <div style={{ display:"flex", gap:"8px" }}>
          <button onClick={()=>setMetodoPago("EFECTIVO")} style={{ flex:1, padding:"10px", borderRadius:"8px", fontWeight:"bold", cursor:"pointer", border:"none", background: metodoPago==="EFECTIVO" ? "#16a34a" : "#1a1d2a", color: metodoPago==="EFECTIVO" ? "#fff" : "#888" }}>💵 Efectivo</button>
          <button onClick={()=>setMetodoPago("VISA")} style={{ flex:1, padding:"10px", borderRadius:"8px", fontWeight:"bold", cursor:"pointer", border:"none", background: metodoPago==="VISA" ? "#1d4ed8" : "#1a1d2a", color: metodoPago==="VISA" ? "#fff" : "#888" }}>💳 Visa</button>
        </div>
        {tipoPedido !== "comer" && (
          <button onClick={() => {
            const nuevoTipo = tipoPedido==="llevar" ? "recoger" : "llevar";
            const nuevoNumero = generarNumeroPedido(nuevoTipo);
            const datosPedido = pedidos[tipoPedido][pedidoNumero];
            setPedidos(prev => { const c={...prev}; c[nuevoTipo]={...c[nuevoTipo],[nuevoNumero]:datosPedido}; delete c[tipoPedido][pedidoNumero]; return c; });
            setTipoPedido(nuevoTipo); setPedidoNumero(nuevoNumero);
          }} style={{ ...darkBtn("#1a1d2a","#a78bfa"), border:"1px solid #7c3aed" }}>
            {tipoPedido==="llevar" ? "🔄 Pasar a RECOGER" : "🔄 Pasar a LLEVAR"}
          </button>
        )}
      </div>
    )}

    {/* BOTONES ACCIÓN */}
    <div style={{ display:"flex", gap:"8px", marginTop:"8px" }}>
      <button onClick={() => setModoCocina(true)} style={{ flex:1, ...darkBtn("linear-gradient(135deg,#ea580c,#c2410c)") }}>🍳 Cocina</button>
      <button onClick={() => { setNumeroTicket(generarNumeroTicket()); setModoTicket(true); }} style={{ flex:1, ...darkBtn("#1e2130","#ccc"), border:"1px solid #2a2f45" }}>🧾 Ticket</button>
    </div>
    {porPersona && <div style={{ fontSize:"13px", color:"#555", marginTop:"6px" }}>Por persona: {porPersona}€</div>}

    <button onClick={cerrarPedido} style={{ width:"100%", marginTop:"10px", padding:"12px", borderRadius:"8px", background:"transparent", border:"1.5px solid #dc2626", color:"#ef4444", fontWeight:"bold", fontSize:"14px", cursor:"pointer" }}>
      {tipoPedido==="comer" ? "❌ Cerrar mesa" : "❌ Cerrar pedido"}
    </button>

    {/* MODAL NOTAS */}
{productoEditando && (
  <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:50 }}>
    <div style={{ background:"#141720", border:"1px solid #2a2f45", borderRadius:"16px", padding:"20px", width:"320px" }}>
      <div style={{ fontWeight:"bold", marginBottom:"12px", color:"#fff" }}>MODIFICACIONES</div>
      <input placeholder="NOTA..." value={notaTemp} onChange={e=>setNotaTemp(e.target.value)} style={{...darkInput, marginBottom:"12px"}} />
      {[["aceite","ACEITE"],["gluten","SIN GLUTEN"],["verdura","NO VERDURA"],["carne","NO CARNE"],["huevo","NO HUEVO"],["marisco","ALERGIA MARISCO"],["frutossecos","ALERGIA FRUTOS SECOS"]].map(([key,label])=>(
        <div key={key} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"6px 0", borderBottom:"1px solid #1e2130" }}>
          <span style={{ color:"#ccc", fontSize:"14px" }}>{label}</span>
          <input type="checkbox" checked={!!checksTemp[key]} onChange={()=>setChecksTemp({...checksTemp,[key]:!checksTemp[key]})} style={{ width:"18px", height:"18px", accentColor:"#7c3aed" }} />
        </div>
      ))}
      <div style={{ display:"flex", gap:"8px", marginTop:"16px" }}>
        <button onClick={()=>{ guardarPedido(ticket.map(t=>t===productoEditando?{...t,nota:notaTemp,...checksTemp}:t)); setProductoEditando(null); }} style={{ flex:1, ...darkBtn("#16a34a") }}>GUARDAR</button>
        <button onClick={()=>setProductoEditando(null)} style={{ flex:1, ...darkBtn("#1a1d2a","#aaa"), border:"1px solid #2a2f45" }}>CANCELAR</button>
      </div>
    </div>
  </div>
)}

{subMenuEditando && (
  <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.7)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:50 }}>
    <div style={{ background:"#141720", border:"1px solid #2a2f45", borderRadius:"16px", padding:"20px", width:"320px" }}>
      <div style={{ fontWeight:"bold", marginBottom:"12px", color:"#fff" }}>MODIFICAR {subMenuEditando.subRef}</div>
      <input placeholder="NOTA..." value={notaTemp} onChange={e=>setNotaTemp(e.target.value)} style={{...darkInput, marginBottom:"12px"}} />
      {[["aceite","ACEITE"],["gluten","SIN GLUTEN"],["verdura","NO VERDURA"],["carne","NO CARNE"],["huevo","NO HUEVO"],["marisco","ALERGIA MARISCO"],["frutossecos","ALERGIA FRUTOS SECOS"]].map(([key,label])=>(
        <div key={key} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"6px 0", borderBottom:"1px solid #1e2130" }}>
          <span style={{ color:"#ccc", fontSize:"14px" }}>{label}</span>
          <input type="checkbox" checked={!!checksTemp[key]} onChange={()=>setChecksTemp({...checksTemp,[key]:!checksTemp[key]})} style={{ width:"18px", height:"18px", accentColor:"#7c3aed" }} />
        </div>
      ))}
      <div style={{ display:"flex", gap:"8px", marginTop:"16px" }}>
        <button onClick={()=>{
          const texto=[checksTemp.aceite&&"ACEITE",checksTemp.gluten&&"SIN GLUTEN",checksTemp.verdura&&"NO VERDURA",checksTemp.carne&&"NO CARNE",checksTemp.huevo&&"NO HUEVO",checksTemp.marisco&&"ALERGIA MARISCO",checksTemp.frutossecos&&"ALERGIA FRUTOS SECOS",notaTemp].filter(Boolean).join("\n");
          guardarPedido(ticket.map(t=>t.ref===subMenuEditando.menuRef&&t.esMenuPadre?{...t,mods:{...t.mods,[subMenuEditando.subRef]:texto.toUpperCase()}}:t));
          setSubMenuEditando(null);
        }} style={{ flex:1, ...darkBtn("#16a34a") }}>GUARDAR</button>
        <button onClick={()=>setSubMenuEditando(null)} style={{ flex:1, ...darkBtn("#1a1d2a","#aaa"), border:"1px solid #2a2f45" }}>CANCELAR</button>
      </div>
    </div>
  </div>
)}

  </div>
  </div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<POSApp />);

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker
      .register("./sw.js")
      .then(reg => console.log("Service Worker registrado", reg))
      .catch(err => console.log("Error registrando SW", err));
  });
}

      </script>
</body>
</html>
